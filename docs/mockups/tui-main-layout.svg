  <text x="74" y="55" fill="#8b949e" font-size="10">File Tree</text>
  <text x="160" y="55" fill="#8b949e" font-size="10">Tools</text>

  <!-- Session list -->
  <text x="12" y="90" fill="#8b949e" font-size="9" font-weight="bold">ACTIVE</text>

  <!-- Session 1 (selected) -->
  <rect x="8" y="98" width="244" height="44" rx="6" fill="#1f2937" stroke="#388bfd" stroke-width="1"/>
  <text x="16" y="116" fill="#c9d1d9" font-size="11">&#x25b6; refactor-auth-module</text>
  <text x="16" y="132" fill="#8b949e" font-size="9">Build · 24msgs · 2m ago</text>

  <!-- Session 2 -->
  <rect x="8" y="146" width="244" height="36" rx="6" fill="transparent"/>
  <text x="16" y="162" fill="#8b949e" font-size="11">&#x25cf; fix-login-bug</text>
  <text x="16" y="176" fill="#484f58" font-size="9">Build · 8msgs · 1h ago</text>

  <!-- Session 3 -->
  <rect x="8" y="186" width="244" height="36" rx="6" fill="transparent"/>
  <text x="16" y="202" fill="#8b949e" font-size="11">&#x25cf; plan-database-schema</text>
  <text x="16" y="216" fill="#484f58" font-size="9">Plan · 42msgs · 3h ago</text>

  <!-- Divider -->
  <line x1="12" y1="238" x2="248" y2="238" stroke="#21262d" stroke-width="1"/>

