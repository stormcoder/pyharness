  <text x="12" y="774" fill="#8b949e" font-size="9">Ctrl+x l sessions · Ctrl+x n new</text>

  <!-- === MAIN CHAT AREA === -->
  <rect x="260" y="36" width="1060" height="748" fill="#0d1117"/>

  <!-- User message -->
  <rect x="276" y="52" width="600" height="52" rx="6" fill="transparent"/>
  <text x="284" y="68" fill="#58a6ff" font-size="10" font-weight="bold">You</text>
  <text x="320" y="68" fill="#484f58" font-size="9">12:34 PM</text>
  <text x="284" y="88" fill="#c9d1d9" font-size="12">Can you refactor the authentication middleware in</text>
  <text x="284" y="104" fill="#c9d1d9" font-size="12"><tspan fill="#ffa657">@src/auth/middleware.py</tspan> to use dependency injection?</text>

  <!-- Assistant response -->
  <rect x="276" y="116" width="1000" height="340" rx="6" fill="transparent"/>
  <text x="284" y="132" fill="#7ee787" font-size="10" font-weight="bold">Assistant</text>
  <text x="360" y="132" fill="#484f58" font-size="9">12:34 PM</text>
  <text x="284" y="152" fill="#c9d1d9" font-size="12">I'll refactor the auth middleware to use dependency injection. Let me first explore the</text>
  <text x="284" y="168" fill="#c9d1d9" font-size="12">current code structure.</text>

  <!-- Tool call: bash -->
  <rect x="284" y="184" width="980" height="24" rx="4" fill="#1a1525" stroke="#30363d" stroke-width="0.5"/>
  <text x="292" y="201" fill="#d2a8ff" font-size="10">&#x25b6; bash</text>
  <text x="340" y="201" fill="#c9d1d9" font-size="10">grep -rn "class AuthMiddleware" src/</text>

  <!-- Tool call: read -->
  <rect x="284" y="212" width="980" height="24" rx="4" fill="#1a1525" stroke="#30363d" stroke-width="0.5"/>
  <text x="292" y="229" fill="#d2a8ff" font-size="10">&#x25b6; read</text>
  <text x="340" y="229" fill="#c9d1d9" font-size="10">src/auth/middleware.py</text>

  <!-- Tool result -->
  <rect x="292" y="240" width="964" height="120" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <text x="304" y="258" fill="#8b949e" font-size="10">Output:</text>
  <text x="304" y="276" fill="#7ee787" font-size="10">1:  class AuthMiddleware:</text>
  <text x="304" y="292" fill="#7ee787" font-size="10">2:      def __init__(self, app, secret_key: str, token_ttl: int = 3600):</text>
  <text x="304" y="308" fill="#7ee787" font-size="10">3:          self.app = app</text>
  <text x="304" y="324" fill="#7ee787" font-size="10">4:          self.secret_key = secret_key</text>
  <text x="304" y="340" fill="#7ee787" font-size="10">5:          self.token_ttl = token_ttl</text>
  <text x="304" y="356" fill="#8b949e" font-size="9">... 42 more lines</text>

  <!-- Assistant continued -->
  <text x="284" y="380" fill="#c9d1d9" font-size="12">I can see the middleware hardcodes <tspan fill="#ff7b72">secret_key</tspan> and <tspan fill="#ff7b72">token_ttl</tspan></text>
  <text x="284" y="396" fill="#c9d1d9" font-size="12">in __init__. Let me refactor this to accept an injectable <tspan fill="#d2a8ff">AuthConfig</tspan> object.</text>

  <!-- Tool call: edit -->
  <rect x="284" y="412" width="980" height="24" rx="4" fill="#1a1525" stroke="#30363d" stroke-width="0.5"/>
  <text x="292" y="429" fill="#d2a8ff" font-size="10">&#x25b6; edit</text>
  <text x="340" y="429" fill="#c9d1d9" font-size="10">src/auth/middleware.py [+12 -5 lines]</text>

  <!-- Diff preview -->
  <rect x="292" y="440" width="964" height="70" rx="4" fill="#0d1117" stroke="#21262d" stroke-width="0.5"/>
  <text x="304" y="456" fill="#8b949e" font-size="9">&#x25b3; src/auth/middleware.py</text>
  <text x="304" y="472" fill="#f85149" font-size="10">-    def __init__(self, app, secret_key: str, token_ttl: int = 3600):</text>
  <text x="304" y="488" fill="#f85149" font-size="10">-        self.secret_key = secret_key</text>
  <text x="304" y="504" fill="#3fb950" font-size="10">+    def __init__(self, app, config: AuthConfig):</text>

